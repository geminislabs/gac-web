name: Deploy GAC Web to EC2

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_KEY }}
          name: id_rsa
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for deployment
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gac-web:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_AUTH_TOKEN=${{ github.token }}
            PUBLIC_GAC_API_URL=${{ vars.PUBLIC_GAC_API_URL }}
            PUBLIC_SISCOM_ADMIN_API_URL=${{ vars.PUBLIC_SISCOM_ADMIN_API_URL }}
            PUBLIC_SISCOM_API_URL=${{ vars.PUBLIC_SISCOM_API_URL }}
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Save Docker image
        run: docker save gac-web:latest | gzip > gac-web.tar.gz

      - name: Copy Docker image to EC2
        run: |
          echo "Copying Docker image to server..."
          scp -o StrictHostKeyChecking=no -P ${{ secrets.EC2_SSH_PORT }} -i ~/.ssh/id_rsa gac-web.tar.gz ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/tmp/
          echo "Copy completed."

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.EC2_SSH_PORT }} -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          APP_NAME="gac-web"
          PORT="${{ vars.PORT }}"
          [ -z "$PORT" ] && PORT=3000

          echo "=== Deploying $APP_NAME on port $PORT ==="

          echo "=== Stopping previous container ==="
          docker stop $APP_NAME || true
          docker rm $APP_NAME || true

          echo "=== Cleaning up ==="
          docker image prune -f || true

          echo "=== Loading new image ==="
          cd /tmp
          if [ -f gac-web.tar.gz ]; then
              docker load < gac-web.tar.gz
              rm gac-web.tar.gz
          else
              echo "Error: Image file not found"
              exit 1
          fi

          echo "=== Starting new container ==="
          docker run -d \
              --name $APP_NAME \
              --restart unless-stopped \
              --network siscom-network \
              -p $PORT:$PORT \
              -e PORT=$PORT \
              -e NODE_ENV=production \
              -e ORIGIN=${{ secrets.ORIGIN }} \
              gac-web:latest

          echo "=== Deployment successful ==="
          EOF
